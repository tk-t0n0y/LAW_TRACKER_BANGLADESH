name: Track BD Law Updates

on:
  schedule:
    # Run every Sunday at 00:00 UTC (Weekly)
    - cron: '0 0 * * 0'
  workflow_dispatch: # Allows manual trigger

jobs:
  check-updates:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4 lxml

      - name: Run Scraper
        run: python track_bdlaws.py

      - name: Check for changes
        id: git_status
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            echo "changes=true" >> $GITHUB_OUTPUT
          else
            echo "changes=false" >> $GITHUB_OUTPUT
          fi

      - name: Commit & Push changes
        if: steps.git_status.outputs.changes == 'true'
        run: |
          git config --global user.name "BDLaws Update Bot"
          git config --global user.email "bot@github.com"
          git add laws_database.json README.md
          git commit -m "Update: New Bangladeshi laws added to database and README"
          git push
